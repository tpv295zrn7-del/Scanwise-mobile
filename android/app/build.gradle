apply plugin: "com.android.application"
apply plugin: "com.google.gms.google-services"

android {
    namespace "com.scanwise.mobile"
    compileSdk 34

    defaultConfig {
        applicationId "com.scanwise.mobile"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            storeFile file('keystore/scanwise.keystore')
            storePassword project.findProperty('KEYSTORE_PASS') ?: ''
            keyAlias project.findProperty('KEY_ALIAS') ?: ''
            keyPassword project.findProperty('KEY_PASS') ?: ''
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            signingConfig signingConfigs.release
            debuggable false
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    splits {
        abi {
            reset()
            enable true
            universalApk true
            include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-android'
    implementation 'com.facebook.react:hermes-android'

    // ML Kit barcode scanning
    implementation 'com.google.mlkit:barcode-scanning:17.1.0'

    // CameraX (used by Vision Camera)
    implementation 'androidx.camera:camera-core:1.3.0'
    implementation 'androidx.camera:camera-camera2:1.3.0'
    implementation 'androidx.camera:camera-lifecycle:1.3.0'
    implementation 'androidx.camera:camera-view:1.3.0'
}
