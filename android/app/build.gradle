apply plugin: "com.android.application"
apply plugin: "com.google.gms.google-services"

android {
    namespace "com.scanwise.mobile"
    compileSdk 34

    defaultConfig {
        applicationId "com.scanwise.mobile"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            def keystoreFile = project.findProperty('KEYSTORE_FILE') ?: 'keystore/scanwise.keystore'
            def keystorePass = project.findProperty('KEYSTORE_PASS') ?: ''
            def keyAlias = project.findProperty('KEY_ALIAS') ?: ''
            def keyPass = project.findProperty('KEY_PASS') ?: ''

            if (keystorePass.isEmpty() || keyAlias.isEmpty() || keyPass.isEmpty()) {
                throw new GradleException(
                    "Release signing credentials are missing. " +
                    "Set KEYSTORE_PASS, KEY_ALIAS, and KEY_PASS project properties."
                )
            }

            def resolvedKeystore = file(keystoreFile)
            if (!resolvedKeystore.exists()) {
                throw new GradleException(
                    "Keystore file not found: ${resolvedKeystore.absolutePath}. " +
                    "Run scripts/generate-keystore.sh or set KEYSTORE_FILE to the correct path."
                )
            }

            storeFile resolvedKeystore
            storePassword keystorePass
            keyAlias keyAlias
            keyPassword keyPass
        }
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            signingConfig signingConfigs.release
            debuggable false
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    splits {
        abi {
            reset()
            enable true
            universalApk true
            include "armeabi-v7a", "arm64-v8a"
        }
    }
}

dependencies {
    implementation 'com.facebook.react:react-android'
    implementation 'com.facebook.react:hermes-android'

    // ML Kit barcode scanning
    implementation 'com.google.mlkit:barcode-scanning:17.1.0'

    // CameraX (used by Vision Camera)
    implementation 'androidx.camera:camera-core:1.3.0'
    implementation 'androidx.camera:camera-camera2:1.3.0'
    implementation 'androidx.camera:camera-lifecycle:1.3.0'
    implementation 'androidx.camera:camera-view:1.3.0'
}
